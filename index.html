<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Clima Agora</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous"
    referrerpolicy="no-referrer"
  />
</head>

<body>
  <main class="container">
    <section class="form" aria-labelledby="form-title">
      <h1 id="form-title">Clima Agora</h1>
      <p class="subtitle">Pesquise uma cidade para consultar a previsão atual.</p>

      <form class="form-input-container" id="weather-form">
        <label for="city-input" class="sr-only">Nome da cidade</label>

        <input
          type="text"
          placeholder="Digite o nome da cidade..."
          id="city-input"
          autocomplete="off"
        />

        <button id="search" type="submit" aria-label="Pesquisar clima">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>

      <p id="error-message" class="error-message hide"></p>
    </section>

    <section id="weather-data" class="weather-data hide" aria-live="polite">
      <h2>
        <i class="fa-solid fa-location-dot"></i>
        <span id="city"></span>
        <img src="" alt="Bandeira do país" id="country" />
      </h2>

      <p id="temperature"><span></span>&deg;C</p>

      <div id="description-container">
        <p id="description"></p>
        <img src="" alt="Condições do tempo" id="weather-icon" />
      </div>

      <div id="details-container">
        <p id="humidity">
          <i class="fa-solid fa-droplet"></i>
          Umidade:
          <span></span>
        </p>

        <p id="wind">
          <i class="fa-solid fa-wind"></i>
          Vento:
          <span></span>
        </p>
      </div>
    </section>
  </main>

  <script src="scripts.js"></script>
</body>
</html>
